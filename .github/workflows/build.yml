name: Shared Build Pipeline

on:
  workflow_call:

    inputs:
      project-name:
        required: true
        type: string

      date:
        required: false
        type: string


    secrets:
      dockerhub-username:
        required: true

      dockerhub-password:
        required: true  

jobs:
  build:
    runs-on: ubuntu-latest

    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Print Repo Name
        run: echo "Repository = ${{ github.repository }}"

      - name: Print Branch Name
        run: echo "Branch = ${{ github.ref_name }} "

      - name: Print Commit
        run: echo "Commit = ${{ github.sha }} "

      - name: Simulate a Build
        run: |
          echo "Building ${{ inputs.project-name }} on Date: ${{ inputs.date }} ..."
          sleep 5
          echo "Build Complete!"


      - name: Login to Dockerhub
        run: |
          echo "Logging in to Dockerhub"
          echo "${{ secrets.dockerhub-password }}" | docker login -u "${{ secrets.dockerhub-username }}" --password-stdin
          echo "login success"
          

